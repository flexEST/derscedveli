<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI İmtahan Köməkçisi</title>
<style>
    body { font-family: Arial, sans-serif; margin:0; background:#1e1e1e; color:#fff; }
    .chat-container { max-width:600px; margin:0 auto; padding:20px; }
    #chatBox { height: 70vh; overflow-y:auto; border:1px solid #444; padding:10px; border-radius:8px; background:#2e2e2e; }
    .msg { display:flex; margin:10px 0; }
    .msg-avatar { width:40px; text-align:center; }
    .msg-bubble { padding:10px; border-radius:8px; max-width:80%; }
    .msg.user .msg-bubble { background:#3a86ff; color:#fff; margin-left:auto; }
    .msg.ai .msg-bubble { background:#444; color:#fff; margin-right:auto; }
    .typing-indicator { display:flex; gap:4px; padding:10px; }
    .typing-dot { width:8px; height:8px; background:#fff; border-radius:50%; animation:blink 1s infinite; }
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes blink { 0%,80%,100%{opacity:0;}40%{opacity:1;} }
    #inputArea { display:flex; margin-top:10px; }
    #userInput { flex:1; padding:10px; border-radius:5px; border:none; outline:none; }
    #sendBtn { padding:10px 20px; border:none; border-radius:5px; background:#3a86ff; color:#fff; margin-left:5px; cursor:pointer; }
    #sendBtn.loading { opacity:0.6; cursor:wait; }
    #errorCard { display:none; background:#ff4c4c; padding:10px; border-radius:5px; margin-top:10px; }
</style>
</head>
<body>
<div class="chat-container">
    <div id="chatBox"><div id="chatEmpty">Salam! Suallarınızı buradan göndərin.</div></div>
    <div id="errorCard"><strong>Xəta:</strong> Serverə qoşula bilmir</div>
    <div id="inputArea">
        <input type="text" id="userInput" placeholder="Suallarınızı yazın...">
        <button id="sendBtn">Göndər</button>
    </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────────────────────
const SERVER_URL = "https://estai-1qe9.vercel.app/api/chat"; // <-- update this
const SYSTEM_PROMPT = `Sən Azərbaycan dilində imtahan suallarını izah edən bir müəllim köməkçisisin.
Tələbə sənə imtahan sualları, cavablar, və öz cəhdlərini göstərəcək.
Qaydalar:
- Həmişə Azərbaycan dilində cavab ver
- Qısa, aydın və anlayışlı izahatlar ver
- Düzgün cavabı mütləq göstər
- Yanlış cavabı seçmişsə, niyə yanlış olduğunu izah et
- Mövzunu daha yaxşı anlamaq üçün faydalı ipucları ver
- **qalın** mətn mühüm məlumatlar üçün istifadə et
- Həvəsləndirici ol, ancaq dəqiq məlumat ver`;

let conversationHistory = [];

// ── DOM ELEMENTS ─────────────────────────────────────────────
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const errorCard = document.getElementById('errorCard');

// ── EVENT LISTENERS ─────────────────────────────────────────
sendBtn.addEventListener('click', ()=> {
    const text = userInput.value.trim();
    if(text) { sendToAI(text, true); userInput.value=''; }
});
userInput.addEventListener('keypress', e=> {
    if(e.key === 'Enter') sendBtn.click();
});

// ── AI COMMUNICATION ────────────────────────────────────────
async function sendToAI(text, showUserMsg) {
    if(showUserMsg) addMessage('user', text);
    conversationHistory.push({ role:'user', content:text });

    sendBtn.disabled = true;
    sendBtn.classList.add('loading');
    userInput.disabled = true;

    const typing = document.createElement('div');
    typing.className = 'msg ai'; typing.id='typing-msg';
    typing.innerHTML = `<div class="msg-avatar">🤖</div>
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>`;
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch(SERVER_URL, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ system:SYSTEM_PROMPT, messages:conversationHistory })
        });
        document.getElementById('typing-msg')?.remove();

        const data = await res.json();
        if(!res.ok || data.error) {
            showError(data.error || 'Server xətası');
            conversationHistory.pop();
        } else {
            conversationHistory.push({ role:'assistant', content:data.content });
            addMessage('ai', data.content);
        }

    } catch(err) {
        console.error(err);
        document.getElementById('typing-msg')?.remove();
        showError('Serverə qoşula bilmir');
        conversationHistory.pop();
    }

    sendBtn.disabled = false;
    sendBtn.classList.remove('loading');
    userInput.disabled = false;
    userInput.focus();
}

// ── MESSAGE RENDERING ───────────────────────────────────────
function addMessage(role, text) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    msg.innerHTML = `<div class="msg-avatar">${role==='ai'?'🤖':'👤'}</div>
                     <div class="msg-bubble">${role==='ai'?fmtAI(text):esc(text)}</div>`;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function fmtAI(t) {
    t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
    t = t.replace(/`(.+?)`/g,'<code>$1</code>');
    t = t.replace(/\n/g,'<br>');
    return t;
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showError(msg){
    errorCard.style.display='block';
    errorCard.querySelector('strong').textContent = '⚠️ Xəta';
    console.warn(msg);
}
</script>
</body>
</html>
