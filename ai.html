<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Köməkçi — Sual Analizi</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --bg:#0d1117; --surface:#161b27; --card:#1c2333;
            --border:rgba(255,255,255,0.07);
            --blue:#3b82f6; --amber:#f5a623; --green:#22c55e; --red:#ef4444; --purple:#8b5cf6;
            --text:#f1f5f9; --text2:#94a3b8; --text3:#475569;
            --r:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
        }
        body.light {
            --bg:#f0f4f8; --surface:#ffffff; --card:#f8fafc;
            --border:rgba(0,0,0,0.08);
            --text:#0f172a; --text2:#475569; --text3:#94a3b8;
        }
        body { font-family:var(--r); background:var(--bg); min-height:100vh; padding:16px 12px 80px; position:relative; overflow-x:hidden; }
        body::before { content:''; position:fixed; top:-140px; left:-100px; width:450px; height:450px; background:radial-gradient(circle,rgba(139,92,246,0.14) 0%,transparent 70%); border-radius:50%; pointer-events:none; animation:blob 14s ease-in-out infinite alternate; }
        body::after  { content:''; position:fixed; bottom:-100px; right:-80px; width:400px; height:400px; background:radial-gradient(circle,rgba(59,130,246,0.10) 0%,transparent 70%); border-radius:50%; pointer-events:none; animation:blob 18s ease-in-out infinite alternate-reverse; }
        @keyframes blob { from{transform:translate(0,0)scale(1)} to{transform:translate(24px,32px)scale(1.06)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes spin { to{transform:rotate(360deg)} }
        @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .wrap { max-width:480px; margin:0 auto; position:relative; z-index:1; }
        .header { display:flex; align-items:center; gap:14px; margin-bottom:20px; animation:fadeUp .4s ease both; }
        .back-btn { width:42px; height:42px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text2); transition:background .2s,color .2s; flex-shrink:0; cursor:pointer; }
        .back-btn:hover { background:rgba(255,255,255,0.09); color:var(--text); }
        .header-text h1 { font-size:1.4rem; font-weight:700; color:var(--text); line-height:1.1; }
        .header-text p  { font-size:0.78rem; color:var(--text3); margin-top:3px; }
        .ai-badge { display:flex; align-items:center; gap:8px; background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.25); border-radius:18px; padding:10px 16px; margin-bottom:18px; animation:fadeUp .45s ease .05s both; }
        .ai-badge-dot { width:8px; height:8px; border-radius:50%; background:var(--purple); animation:pulse 2s infinite; flex-shrink:0; }
        .ai-badge-text { font-size:0.8rem; color:#c084fc; font-weight:600; flex:1; }
        .ai-badge-model { font-size:0.7rem; color:var(--text3); font-weight:600; background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:2px 8px; border-radius:10px; }

        .context-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:16px; margin-bottom:14px; animation:fadeUp .5s ease .1s both; }
        .context-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--text3); font-weight:700; margin-bottom:10px; }
        .context-question { font-size:0.92rem; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:10px; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; }
        .context-status { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .status-pill { font-size:0.72rem; font-weight:700; padding:3px 12px; border-radius:20px; }
        .status-pill.wrong   { background:rgba(239,68,68,0.15);  border:1px solid rgba(239,68,68,0.3);  color:#fca5a5; }
        .status-pill.correct { background:rgba(34,197,94,0.12);  border:1px solid rgba(34,197,94,0.3);  color:#86efac; }
        .status-pill.pending { background:rgba(245,166,35,0.12); border:1px solid rgba(245,166,35,0.25); color:var(--amber); }
        .context-answer { font-size:0.82rem; color:var(--text2); line-height:1.5; padding:8px 12px; border-radius:10px; margin-bottom:4px; }
        .context-answer.wrong-bg  { background:rgba(239,68,68,0.06);  border:1px solid rgba(239,68,68,0.15); }
        .context-answer.correct-bg { background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.15); }

        .chat-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; min-height:200px; max-height:52vh; overflow-y:auto; padding:14px; margin-bottom:14px; display:flex; flex-direction:column; gap:12px; animation:fadeUp .55s ease .15s both; scroll-behavior:smooth; }
        .chat-box::-webkit-scrollbar { width:4px; }
        .chat-box::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
        .chat-empty { text-align:center; padding:30px 0; color:var(--text3); font-size:0.85rem; }
        .chat-empty-icon { font-size:2rem; margin-bottom:8px; }

        .msg { display:flex; gap:10px; animation:msgIn .3s ease both; }
        .msg.user { flex-direction:row-reverse; }
        .msg-avatar { width:32px; height:32px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
        .msg.ai   .msg-avatar { background:rgba(139,92,246,0.2); border:1px solid rgba(139,92,246,0.3); }
        .msg.user .msg-avatar { background:rgba(59,130,246,0.2); border:1px solid rgba(59,130,246,0.3); }
        .msg-bubble { max-width:85%; padding:12px 14px; border-radius:16px; font-size:0.87rem; line-height:1.6; }
        .msg.ai   .msg-bubble { background:var(--card); border:1px solid var(--border); color:var(--text); border-top-left-radius:4px; }
        .msg.user .msg-bubble { background:linear-gradient(135deg,#1d4ed8,#3b82f6); color:white; border-top-right-radius:4px; }
        .msg-bubble strong { font-weight:700; }
        .msg-bubble em { font-style:italic; opacity:0.85; }
        .msg-bubble code { background:rgba(255,255,255,0.1); padding:1px 5px; border-radius:4px; font-size:0.82rem; font-family:monospace; }
        .msg-bubble .bullet { display:block; padding-left:10px; margin-bottom:2px; }
        .msg-bubble .bullet::before { content:'• '; color:#c084fc; }

        .typing-indicator { display:flex; gap:4px; padding:10px 14px; background:var(--card); border:1px solid var(--border); border-radius:16px; border-top-left-radius:4px; width:fit-content; }
        .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); animation:pulse 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay:.2s; }
        .typing-dot:nth-child(3) { animation-delay:.4s; }

        .input-area { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:12px 14px; animation:fadeUp .6s ease .2s both; }
        .input-row { display:flex; gap:10px; align-items:flex-end; }
        .input-field { flex:1; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:10px 14px; font-family:var(--r); font-size:0.88rem; color:var(--text); resize:none; min-height:44px; max-height:120px; outline:none; transition:border-color .2s; line-height:1.5; }
        .input-field:focus { border-color:rgba(139,92,246,0.4); }
        .input-field::placeholder { color:var(--text3); }
        .send-btn { width:44px; height:44px; background:linear-gradient(135deg,#6d28d9,#8b5cf6); border:none; border-radius:13px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; flex-shrink:0; transition:filter .15s,transform .15s; box-shadow:0 6px 16px -4px rgba(139,92,246,0.4); position:relative; }
        .send-btn:hover { filter:brightness(1.1); }
        .send-btn:active { transform:scale(0.93); }
        .send-btn:disabled { background:#1e293b; box-shadow:none; cursor:not-allowed; }
        .send-btn .spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; }
        .send-btn.loading .send-icon { display:none; }
        .send-btn.loading .spinner  { display:block; }

        .quick-btns { display:flex; gap:7px; flex-wrap:wrap; margin-top:10px; }
        .quick-btn { padding:7px 14px; background:rgba(139,92,246,0.1); border:1px solid rgba(139,92,246,0.2); border-radius:20px; font-size:0.75rem; font-weight:600; color:#c084fc; cursor:pointer; transition:all .2s; font-family:var(--r); }
        .quick-btn:hover { background:rgba(139,92,246,0.2); }

        .theme-toggle { width:42px; height:42px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:13px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; transition:background .2s; flex-shrink:0; }
        body.light .theme-toggle { background:rgba(0,0,0,0.05); }

        .error-card { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); border-radius:16px; padding:14px 16px; margin-bottom:14px; font-size:0.82rem; color:#fca5a5; line-height:1.6; display:none; }
        .error-card.show { display:block; }
        .error-card strong { display:block; margin-bottom:4px; font-size:0.85rem; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="header">
        <div class="back-btn" onclick="goBack()">←</div>
        <div class="header-text">
            <h1>🤖 AI Köməkçi</h1>
            <p>Sualları anla, cavabları öyrən</p>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="ai-badge">
        <div class="ai-badge-dot"></div>
        <div class="ai-badge-text">GPT-4o-mini — Sualı izah edir</div>
        <span class="ai-badge-model">OpenAI</span>
    </div>

    <div class="error-card" id="errorCard">
        <strong>⚠️ Serverə qoşulmaq olmadı</strong>
        Server işləmir. Terminal açıb yazın: <code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;">node server.js</code>
    </div>

    <div class="context-card" id="contextCard" style="display:none;">
        <div class="context-label">📋 Sual Konteksti</div>
        <div id="contextContent"></div>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="chat-empty" id="chatEmpty">
            <div class="chat-empty-icon">🎓</div>
            <div>AI avtomatik olaraq sualınızı izah edəcək...</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <textarea class="input-field" id="userInput" placeholder="Əlavə sual yazın..." rows="1"
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <span class="send-icon">➤</span>
                <div class="spinner"></div>
            </button>
        </div>
        <div class="quick-btns" id="quickBtns" style="display:none;">
            <button class="quick-btn" onclick="quickAsk('Bu sualı ətraflı izah et')">📖 İzah et</button>
            <button class="quick-btn" onclick="quickAsk('Düzgün cavab hansıdır və niyə?')">✅ Cavab</button>
            <button class="quick-btn" onclick="quickAsk('Bu mövzuda daha çox məlumat ver')">📚 Ətraflı</button>
            <button class="quick-btn" onclick="quickAsk('Oxşar sual ver ki, məşq edim')">🔄 Məşq</button>
        </div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// SERVER URL — change port here if you used a different one
// ─────────────────────────────────────────────────────────────
const SERVER_URL = "https://estai-1qe9.vercel.app/api/chat";

const SYSTEM_PROMPT = `Sən Azərbaycan dilində imtahan suallarını izah edən bir müəllim köməkçisisin.
Tələbə sənə imtahan sualları, cavablar, və öz cəhdlərini göstərəcək.
Qaydalar:
- Həmişə Azərbaycan dilində cavab ver
- Qısa, aydın və anlayışlı izahatlar ver
- Düzgün cavabı mütləq göstər
- Yanlış cavabı seçmişsə, niyə yanlış olduğunu izah et
- Mövzunu daha yaxşı anlamaq üçün faydalı ipucları ver
- **qalın** mətn mühüm məlumatlar üçün istifadə et
- Həvəsləndirici ol, ancaq dəqiq məlumat ver`;

let conversationHistory = [];
let contextData = null;

// ── Init ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('theme');
    if(saved === 'light') {
        document.body.classList.add('light');
        document.querySelector('.theme-toggle').textContent = '🌑';
    }
    const raw = localStorage.getItem('aiContext');
    if(raw) {
        try {
            contextData = JSON.parse(raw);
            renderContext(contextData);
            localStorage.removeItem('aiContext');
            setTimeout(() => autoAsk(contextData), 400);
        } catch(e) {}
    }
});

// ── Render context card ──────────────────────────────────────
function renderContext(ctx) {
    document.getElementById('contextCard').style.display = 'block';
    document.getElementById('quickBtns').style.display = 'flex';
    const content = document.getElementById('contextContent');
    let html = '';

    if(ctx.type === 'mistakes') {
        html += `<span class="status-pill wrong" style="display:inline-block;margin-bottom:10px;">❌ ${ctx.mistakes.length} sual yanlış cavablandı</span>`;
        ctx.mistakes.forEach((m, i) => {
            html += `<div style="margin-bottom:10px;">`;
            html += `<div class="context-question">${i+1}. ${m.questionText}</div>`;
            if(m.yourAnswer)    html += `<div class="context-answer wrong-bg">❌ Sizin cavab: ${m.yourAnswer}</div>`;
            if(m.correctAnswer) html += `<div class="context-answer correct-bg">✅ Düzgün: ${m.correctAnswer}</div>`;
            html += `</div>`;
        });
    } else {
        html += `<div class="context-question">${ctx.questionText}</div>`;
        if(ctx.status === 'wrong' || ctx.status === 'correct') {
            const cls   = ctx.status === 'wrong' ? 'wrong' : 'correct';
            const label = ctx.status === 'wrong' ? '❌ Yanlış cavabladınız' : '✅ Düzgün cavabladınız';
            html += `<div class="context-status"><span class="status-pill ${cls}">${label}</span></div>`;
            if(ctx.yourAnswer)    html += `<div class="context-answer wrong-bg">Sizin cavab: ${ctx.yourAnswer}</div>`;
            if(ctx.correctAnswer) html += `<div class="context-answer correct-bg">Düzgün cavab: ${ctx.correctAnswer}</div>`;
        } else {
            html += `<div class="context-status"><span class="status-pill pending">📝 İmtahan göndərilməyib</span></div>`;
            if(ctx.optionsText) html += `<div class="context-answer">Variantlar: ${ctx.optionsText}</div>`;
        }
    }
    content.innerHTML = html;
}

// ── Build auto-prompt from context ───────────────────────────
function buildInitialPrompt(ctx) {
    if(ctx.type === 'mistakes') {
        let p = `İmtahanda aşağıdakı sualları yanlış cavabladım. Hər birini izah et:\n\n`;
        ctx.mistakes.forEach((m, i) => {
            p += `Sual ${i+1}: ${m.questionText}\n`;
            if(m.yourAnswer)    p += `Mənim cavabım: ${m.yourAnswer}\n`;
            if(m.correctAnswer) p += `Düzgün cavab: ${m.correctAnswer}\n`;
            p += `\n`;
        });
        return p;
    }

    let p = `İmtahan sualı: ${ctx.questionText}\n`;
    if(ctx.optionsText) p += `Variantlar: ${ctx.optionsText}\n`;

    if(ctx.status === 'wrong') {
        p += `\nMən bu suala YANLIŞ cavab verdim.\nMənim cavabım: ${ctx.yourAnswer || 'seçilməyib'}\nDüzgün cavab: ${ctx.correctAnswer || '?'}\n\nNiyə yanlış olduğumu izah et və düzgün cavabı öyrədir.`;
    } else if(ctx.status === 'correct') {
        p += `\nMən bu suala DÜZGÜN cavab verdim: ${ctx.yourAnswer}.\n\nBu mövzunu daha dərindən izah et ki, daha yaxşı anlayım.`;
    } else {
        p += `\nBu sualı izah et və düzgün cavabı öyrədir.`;
    }
    return p;
}

async function autoAsk(ctx) {
    await sendToAI(buildInitialPrompt(ctx), false);
}

// ── UI helpers ───────────────────────────────────────────────
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
    if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickAsk(text) {
    const suffix = contextData
        ? (contextData.type === 'mistakes'
            ? ' (bütün yanlış suallarım üçün)'
            : ` bu sual üçün: "${contextData.questionText.slice(0,50)}..."`)
        : '';
    sendToAI(text + suffix, true);
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    input.style.height = 'auto';
    await sendToAI(text, true);
}

// ── Core: call proxy server ──────────────────────────────────
async function sendToAI(text, showUserMsg) {
    const chatBox = document.getElementById('chatBox');
    const sendBtn = document.getElementById('sendBtn');
    const empty   = document.getElementById('chatEmpty');
    if(empty) empty.remove();
    document.getElementById('errorCard').classList.remove('show');

    if(showUserMsg) addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    sendBtn.disabled = true;
    sendBtn.classList.add('loading');
    document.getElementById('userInput').disabled = true;

    // Show typing dots
    const typing = document.createElement('div');
    typing.className = 'msg ai'; typing.id = 'typing-msg';
    typing.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch(SERVER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ system: SYSTEM_PROMPT, messages: conversationHistory })
        });

        document.getElementById('typing-msg')?.remove();
        const data = await res.json();

        if(!res.ok || data.error) {
            showError(data.error || 'Server xətası');
            conversationHistory.pop();
        } else {
            conversationHistory.push({ role: 'assistant', content: data.content });
            addMessage('ai', data.content);
        }

    } catch(err) {
        document.getElementById('typing-msg')?.remove();
        document.getElementById('errorCard').classList.add('show');
        conversationHistory.pop();
    }

    sendBtn.disabled = false;
    sendBtn.classList.remove('loading');
    document.getElementById('userInput').disabled = false;
    document.getElementById('userInput').focus();
}

// ── Render messages ──────────────────────────────────────────
function addMessage(role, text) {
    const chatBox = document.getElementById('chatBox');
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    msg.innerHTML = `<div class="msg-avatar">${role === 'ai' ? '🤖' : '👤'}</div><div class="msg-bubble">${role === 'ai' ? fmtAI(text) : esc(text)}</div>`;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function fmtAI(t) {
    t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
    t = t.replace(/`(.+?)`/g,'<code>$1</code>');
    t = t.replace(/^#{2,3} (.+)$/gm,'<strong>$1</strong>');
    t = t.replace(/^[\-•] (.+)$/gm,'<span class="bullet">$1</span>');
    t = t.replace(/^\d+\. (.+)$/gm,'<span class="bullet">$1</span>');
    t = t.replace(/\n/g,'<br>');
    return t;
}

function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showError(msg) {
    const el = document.getElementById('errorCard');
    el.innerHTML = `<strong>⚠️ Xəta</strong>${msg}`;
    el.classList.add('show');
}

function goBack() { history.back(); }

function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    document.querySelector('.theme-toggle').textContent = isLight ? '🌑' : '🌙';
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
}
</script>
</body>
</html>
